<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Enhancer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      font-size: 13px;
      line-height: 1.5;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }

    .header img {
      width: 24px;
      height: 24px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      background: #fafafa;
      color: #1a1a1a;
      transition: border-color 0.15s, background 0.15s;
    }

    select:hover, input:hover {
      background: #fff;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #999;
      background: #fff;
    }

    input[type="password"] {
      font-family: monospace;
      letter-spacing: 1px;
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #333;
    }

    .btn:active {
      background: #000;
    }

    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      display: none;
    }

    .status.success {
      display: block;
      background: #f0f9f0;
      color: #2d6a2d;
    }

    .status.error {
      display: block;
      background: #fdf0f0;
      color: #a33;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 20px 0;
    }

    .hint {
      font-size: 11px;
      color: #999;
      line-height: 1.6;
    }

    .hint-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .hint-key {
      color: #666;
      font-family: monospace;
      font-size: 11px;
    }

    .custom-endpoint {
      display: none;
    }

    .custom-endpoint.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon24.png" alt="">
      <h1>Prompt Enhancer</h1>
    </div>

    <div class="form-group">
      <label>提供商</label>
      <select id="provider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="deepseek">DeepSeek</option>
        <option value="custom">自定义 API</option>
      </select>
    </div>

    <div class="form-group custom-endpoint" id="customEndpointGroup">
      <label>API 地址</label>
      <input type="text" id="customEndpoint" placeholder="https://api.example.com/v1/chat/completions">
    </div>

    <div class="form-group">
      <label>模型</label>
      <select id="model">
        <option value="gpt-4o-mini">gpt-4o-mini</option>
      </select>
    </div>

    <div class="form-group custom-endpoint" id="customModelGroup">
      <label>自定义模型</label>
      <input type="text" id="customModel" placeholder="模型名称">
    </div>

    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
    </div>

    <button class="btn" id="saveBtn">保存</button>

    <div class="status" id="status"></div>

    <div class="divider"></div>

    <div class="hint">
      <div class="hint-row">
        <span>润色</span>
        <span class="hint-key">⌘⇧E</span>
      </div>
      <div class="hint-row">
        <span>撤回</span>
        <span class="hint-key">⌘Z</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
