<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lynx</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="logo-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"
            />
            <path d="M20 2v4" />
            <path d="M22 4h-4" />
            <circle cx="4" cy="20" r="2" />
          </svg>
        </div>
        <h1 data-i18n="extName"></h1>
      </div>

      <div class="trial-banner" id="trialBanner" style="display: none">
        <div class="trial-banner-header">
          <span class="trial-banner-label" id="trialLabel"></span>
          <span class="trial-banner-count" id="trialCount"></span>
        </div>
        <div class="trial-banner-bar">
          <div class="trial-banner-fill" id="trialFill"></div>
        </div>
      </div>

      <div class="setup-notice" id="setupNotice" style="display: none">
        <div class="setup-notice-title" id="setupNoticeTitle"></div>
        <div class="setup-notice-desc" id="setupNoticeDesc"></div>
      </div>

      <div class="form-group">
        <label for="provider" data-i18n="popupProvider"></label>
        <select id="provider" aria-describedby="provider-warning">
          <option value="openai" data-i18n="providerOpenai"></option>
          <option value="anthropic" data-i18n="providerAnthropic"></option>
          <option value="deepseek" data-i18n="providerDeepseek"></option>
          <option value="gemini" data-i18n="providerGemini"></option>
          <option value="kimi" data-i18n="providerKimi"></option>
          <option value="minimax" data-i18n="providerMinimax"></option>
          <option value="qwen" data-i18n="providerQwen"></option>
          <option value="zhipu" data-i18n="providerZhipu"></option>
          <option value="custom" data-i18n="popupCustomApi"></option>
        </select>
      </div>

      <div class="warning-box" id="anthropicWarning" style="display: none">
        <div class="warning-icon">⚠️</div>
        <div class="warning-text" data-i18n="popupAnthropicWarning"></div>
        <label class="warning-checkbox">
          <input type="checkbox" id="anthropicAck" />
          <span data-i18n="popupAnthropicAck"></span>
        </label>
      </div>

      <div class="form-group custom-endpoint" id="customEndpointGroup">
        <label for="customEndpoint" data-i18n="popupApiEndpoint"></label>
        <input
          type="text"
          id="customEndpoint"
          placeholder="https://api.example.com/v1/chat/completions"
        />
        <div class="hint" id="endpointHint"></div>
      </div>

      <div class="form-group">
        <label for="model" data-i18n="popupModel"></label>
        <select id="model">
          <option value="gpt-5.2-chat-latest">gpt-5.2-chat-latest</option>
        </select>
      </div>

      <div class="form-group custom-endpoint" id="customModelGroup">
        <label for="customModel" data-i18n="popupCustomModel"></label>
        <input
          type="text"
          id="customModel"
          data-i18n-placeholder="popupCustomModelPlaceholder"
        />
      </div>

      <div class="form-group">
        <label for="apiKey" class="label-with-tooltip">
          API Key
          <span class="tooltip-trigger" tabindex="0">
            ?
            <span class="tooltip" data-i18n="popupApiKeyTooltip"></span>
          </span>
        </label>
        <input type="password" id="apiKey" placeholder="sk-..." />
        <div class="hint" id="apiKeyHint"></div>
      </div>

      <button class="btn" id="saveBtn" data-i18n="popupSave"></button>

      <div class="status" id="status" role="alert" aria-live="polite"></div>

      <div class="footer">
        <div class="hint">
          <div class="hint-row">
            <span data-i18n="popupEnhance"></span>
            <span class="hint-key" id="shortcutEnhance">
              <kbd>⌘</kbd><kbd>⇧</kbd><kbd>E</kbd>
            </span>
          </div>
          <div class="hint-row">
            <span data-i18n="popupUndo"></span>
            <span class="hint-key" id="shortcutUndo">
              <kbd>⌘</kbd><kbd>Z</kbd>
            </span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
